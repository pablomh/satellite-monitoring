---
# Build and upload the grafana template for the server

- hosts: grafana_pcp
  gather_facts: false
  vars_files:
    - "vars/images.yml"
    - "vars/services.yml"
    - "vars/grafana_pcp.yml"

  pre_tasks:
    - name: Set up rootless service user
      ansible.builtin.include_role:
        name: rootless_user
      vars:
        rootless_user_name: "{{ grafana_pcp_user }}"
        rootless_user_group: "{{ grafana_pcp_group }}"
        rootless_user_home: "{{ grafana_pcp_home }}"
        rootless_user_comment: "Grafana PCP Service User"

    - name: Set XDG_RUNTIME_DIR for grafana_pcp user
      ansible.builtin.set_fact:
        grafana_pcp_xdg_runtime_dir: "{{ rootless_user_xdg_runtime_dir }}"

  roles:
    - role: linux-system-roles.firewall
      vars:
        firewall:
          - service: grafana
            state: enabled
          # # XXX: Needed ???
          # - service: pmcd
          #   state: enabled
          - service: pmproxy
            state: enabled
    - role: linux-system-roles.storage
    - role: linux-system-roles.tuned
    - role: pull_images
    - role: linux-system-roles.selinux
      vars:
        selinux_restore_dirs:
          - /var/lib/containers/storage
    - role: systemd_target
    - role: valkey_quadlet
    - role: pcp_quadlet
    - role: grafana_quadlet
...
