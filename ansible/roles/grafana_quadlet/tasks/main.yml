---
# tasks file for grafana-quadlet

- name: Create Grafana service (quadlet) from the container
  become: true
  become_method: "{{ grafana_pcp_become_method }}"
  become_user: "{{ grafana_pcp_user }}"
  environment: "{{ grafana_pcp_runtime_env }}"
  containers.podman.podman_container:
    name: grafana
    image: "{{ grafana_container }}"
    state: quadlet
    network: host
    volumes: "{{ grafana_volumes }}"
    env: "{{ grafana_env }}"
    sdnotify: healthy
    healthcheck: "{{ grafana_healthcheck }}"
    quadlet_options:
      - |
        [Install]
        WantedBy=default.target grafana.target
        [Unit]
        PartOf=grafana.target
        Wants=valkey.service pcp.service
        After=valkey.service pcp.service

- name: Run daemon reload
  become: true
  become_method: "{{ grafana_pcp_become_method }}"
  become_user: "{{ grafana_pcp_user }}"
  environment: "{{ grafana_pcp_runtime_env }}"
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

- name: Start the Grafana service
  become: true
  become_method: "{{ grafana_pcp_become_method }}"
  become_user: "{{ grafana_pcp_user }}"
  environment: "{{ grafana_pcp_runtime_env }}"
  ansible.builtin.systemd_service:
    name: grafana
    state: started
    scope: user

- name: Wait for Grafana to be ready
  ansible.builtin.uri:
    url: "http://{{ inventory_hostname }}:3000/api/health"
    status_code: 200
  register: _grafana_health
  until: _grafana_health.status == 200
  retries: 10
  delay: 5

- name: Enable PCP plugin
  register: pcp_plugin
  ansible.builtin.uri:
    url: "http://{{ inventory_hostname }}:3000/api/plugins/performancecopilot-pcp-app/settings"
    body_format: json
    force_basic_auth: true
    url_username: "{{ grafana_admin_username }}"
    url_password: "{{ grafana_admin_password }}"
    method: POST
    body:
      enabled: true
      pinned: true
      jsonData: null

